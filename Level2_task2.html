<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognifyz - Level 2 Task 2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0f172a;
      color: white;
    }
    
    /* Part 2: Image Gallery Hover Effect */
    .gallery-img {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      height: 250px;
      object-fit: cover;
    }
    .gallery-img:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .navbar {
      background: #1e293b !important;
    }
    .navbar-brand {
      font-weight: bold;
      color: #38bdf8 !important;
    }
  </style>
</head>
<body>

  <!-- Part 1: Hamburger Menu - Mobile Responsive Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="#">Cognifyz Tech</a>
      
      <!-- Hamburger Button - Mobile lo matrame kanipistundi -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <!-- Menu Items - Desktop lo open, Mobile lo collapse -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#gallery">Gallery</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Services</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Part 2: Responsive Image Gallery -->
  <div class="container py-5" id="gallery">
    <h2 class="text-center mb-2">Part 2: Image Gallery</h2>
    <p class="text-center text-secondary mb-5">Hover over images to see zoom effect</p>
    
    <div class="row g-4">
      <!-- Image 1 -->
      <div class="col-12 col-sm-6 col-lg-4">
        <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=600" 
             class="img-fluid rounded gallery-img w-100" alt="Coding">
      </div>
      
      <!-- Image 2 -->
      <div class="col-12 col-sm-6 col-lg-4">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=600" 
             class="img-fluid rounded gallery-img w-100" alt="Laptop">
      </div>
      
      <!-- Image 3 -->
      <div class="col-12 col-sm-6 col-lg-4">
        <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=600" 
             class="img-fluid rounded gallery-img w-100" alt="Setup">
      </div>
      
      <!-- Image 4 -->
      <div class="col-12 col-sm-6 col-lg-4">
        <img src="https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=600" 
             class="img-fluid rounded gallery-img w-100" alt="Tech">
      </div>
      
      <!-- Image 5 -->
      <div class="col-12 col-sm-6 col-lg-4">
        <img src="https://images.unsplash.com/photo-1550439062-609e1531270e?w=600" 
             class="img-fluid rounded gallery-img w-100" alt="Code">
      </div>
      
      <!-- Image 6 -->
      <div class="col-12 col-sm-6 col-lg-4">
        <img src="https://images.unsplash.com/photo-1605379399843-5870eea9b74e?w=600" 
             class="img-fluid rounded gallery-img w-100" alt="Developer">
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
