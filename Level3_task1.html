<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognifyz - Level 3 Task 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; color: white; }
    .carousel-item img { height: 400px; object-fit: cover; }
    .form-section { background: #1e293b; padding: 40px; border-radius: 12px; }
    .error { color: #f87171; font-size: 14px; margin-top: 4px; }
    .success { color: #4ade80; }
  </style>
</head>
<body>

  <!-- Part 1: Image Slider/Carousel -->
  <div class="container py-5">
    <h2 class="text-center mb-4">Part 1: Image Carousel</h2>
    
    <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">
      <!-- Indicators -->
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
      </div>
      
      <!-- Slides -->
      <div class="carousel-inner rounded">
        <div class="carousel-item active">
          <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=1200" class="d-block w-100" alt="Slide 1">
        </div>
        <div class="carousel-item">
          <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200" class="d-block w-100" alt="Slide 2">
        </div>
        <div class="carousel-item">
          <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1200" class="d-block w-100" alt="Slide 3">
        </div>
      </div>
      
      <!-- Controls -->
      <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </div>

  <!-- Part 2: Form Validation -->
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="form-section">
          <h2 class="text-center mb-4">Part 2: Contact Form</h2>
          <form id="contactForm" novalidate>
            
            <!-- Name -->
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" placeholder="Enter your name">
              <div class="error" id="nameError"></div>
            </div>
            
            <!-- Email -->
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" placeholder="example@mail.com">
              <div class="error" id="emailError"></div>
            </div>
            
            <!-- Phone -->
            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-control" id="phone" placeholder="10 digit number">
              <div class="error" id="phoneError"></div>
            </div>
            
            <!-- Message -->
            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" id="message" rows="3" placeholder="Your message"></textarea>
              <div class="error" id="messageError"></div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Submit</button>
            <div class="text-center mt-3 success" id="successMsg"></div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Form Validation Logic
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Clear previous errors
      document.querySelectorAll('.error').forEach(el => el.textContent = '');
      document.getElementById('successMsg').textContent = '';
      
      let isValid = true;
      
      // 1. Name validation
      const name = document.getElementById('name').value.trim();
      if (name === '') {
        document.getElementById('nameError').textContent = 'Name is required';
        isValid = false;
      } else if (name.length < 3) {
        document.getElementById('nameError').textContent = 'Name must be at least 3 characters';
        isValid = false;
      }
      
      // 2. Email validation
      const email = document.getElementById('email').value.trim();
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (email === '') {
        document.getElementById('emailError').textContent = 'Email is required';
        isValid = false;
      } else if (!emailPattern.test(email)) {
        document.getElementById('emailError').textContent = 'Enter a valid email';
        isValid = false;
      }
      
      // 3. Phone validation
      const phone = document.getElementById('phone').value.trim();
      const phonePattern = /^[0-9]{10}$/;
      if (phone === '') {
        document.getElementById('phoneError').textContent = 'Phone number is required';
        isValid = false;
      } else if (!phonePattern.test(phone)) {
        document.getElementById('phoneError').textContent = 'Enter 10 digit phone number';
        isValid = false;
      }
      
      // 4. Message validation
      const message = document.getElementById('message').value.trim();
      if (message === '') {
        document.getElementById('messageError').textContent = 'Message is required';
        isValid = false;
      } else if (message.length < 10) {
        document.getElementById('messageError').textContent = 'Message must be at least 10 characters';
        isValid = false;
      }
      
      // Success
      if (isValid) {
        document.getElementById('successMsg').textContent = 'Form submitted successfully! ✅';
        document.getElementById('contactForm').reset();
      }
    });
  </script>
</body>
</html>
