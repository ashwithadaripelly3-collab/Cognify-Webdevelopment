<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognifyz - Level 3 Task 2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; color: white; }
    .user-card {
      background: #1e293b;
      border: 1px solid #334155;
      transition: transform 0.2s ease;
    }
    .user-card:hover {
      transform: translateY(-5px);
      border-color: #38bdf8;
    }
    .loader {
      border: 4px solid #334155;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <h2 class="text-center mb-2">Level 3 - Task 2: Fetch API</h2>
    <p class="text-center text-secondary mb-4">External API nundi users data teesukoni display chestunnam</p>
    
    <div class="text-center mb-4">
      <button class="btn btn-primary" onclick="fetchUsers()">Fetch Users Data</button>
      <button class="btn btn-danger ms-2" onclick="clearUsers()">Clear Data</button>
    </div>

    <!-- Loading Spinner -->
    <div id="loader" class="loader" style="display: none;"></div>
    
    <!-- Error Message -->
    <div id="errorMsg" class="alert alert-danger text-center" style="display: none;"></div>
    
    <!-- Users Grid -->
    <div class="row g-4" id="usersContainer"></div>
  </div>

  <script>
    const usersContainer = document.getElementById('usersContainer');
    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('errorMsg');

    // Fetch API Function
    async function fetchUsers() {
      // 1. Clear old data + show loader
      usersContainer.innerHTML = '';
      errorMsg.style.display = 'none';
      loader.style.display = 'block';

      try {
        // 2. Fetch data from JSONPlaceholder API
        const response = await fetch('https://jsonplaceholder.typicode.com/users');
        
        // Check if response is ok
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        
        // 3. Convert to JSON
        const users = await response.json();
        
        // 4. Hide loader
        loader.style.display = 'none';
        
        // 5. Display data on page
        users.forEach(user => {
          const userCard = `
            <div class="col-12 col-md-6 col-lg-4">
              <div class="card user-card h-100 text-white">
                <div class="card-body">
                  <h5 class="card-title text-info">${user.name}</h5>
                  <p class="card-text mb-1"><strong>Username:</strong> ${user.username}</p>
                  <p class="card-text mb-1"><strong>Email:</strong> ${user.email}</p>
                  <p class="card-text mb-1"><strong>Phone:</strong> ${user.phone}</p>
                  <p class="card-text mb-1"><strong>Website:</strong> ${user.website}</p>
                  <p class="card-text"><strong>Company:</strong> ${user.company.name}</p>
                </div>
              </div>
            </div>
          `;
          usersContainer.innerHTML += userCard;
        });
        
      } catch (error) {
        // Error handling
        loader.style.display = 'none';
        errorMsg.textContent = 'Failed to fetch data. Check your internet connection.';
        errorMsg.style.display = 'block';
        console.error('Fetch error:', error);
      }
    }

    // Clear users function
    function clearUsers() {
      usersContainer.innerHTML = '';
      errorMsg.style.display = 'none';
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
